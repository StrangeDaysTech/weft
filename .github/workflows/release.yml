name: release

# Pipeline de release NuGet nativo multi-RID (CHARTER-07/US4, T056/T057/T060).
#
# workflow_dispatch ÚNICAMENTE (no en push/PR): la matriz cross-compile es cara y su validación es
# un dry-run deliberado. El paso de PUBLISH (nuget push + tag + GitHub Release) va GATEADO tras
# `inputs.dry_run` (default true) → un dispatch normal construye/empaqueta/smoke SIN publicar. Publicar
# es un acto deliberado del operador: dispatch con dry_run=false + Trusted Publishing (OIDC) + environment.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: build + pack + pack-smoke, SIN publicar a NuGet.org"
        type: boolean
        default: true
      version:
        description: "Versión SemVer del paquete (p. ej. 0.1.0)"
        type: string
        default: "0.1.0-alpha"

permissions:
  contents: read

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # ── Cross-compile los 2 shims por RID (release, stripped, SIN test-hooks) ────────────────────
  native:
    name: native (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tool: zigbuild
          - rid: linux-arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            tool: zigbuild
          - rid: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            tool: cargo
          - rid: osx-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            tool: cargo
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Setup zig
        if: matrix.tool == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: cargo install cargo-zigbuild --locked
      - name: Build shims (release, stripped, sin test-hooks)
        working-directory: native
        shell: bash
        run: |
          set -euo pipefail
          STRIP='profile.release.strip="symbols"'
          if [ "${{ matrix.tool }}" = "zigbuild" ]; then
            cargo zigbuild --release --config "$STRIP" --target ${{ matrix.target }} -p weft-yrs-ffi -p weft-loro-ffi
          else
            cargo build --release --config "$STRIP" --target ${{ matrix.target }} -p weft-yrs-ffi -p weft-loro-ffi
          fi
      - name: Collect cdylibs
        working-directory: native
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cp target/${{ matrix.target }}/release/*weft_yrs_ffi.* out/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/*weft_loro_ffi.* out/ 2>/dev/null || true
          # Quedarnos solo con el cdylib (descartar .d/.rlib/.pdb/.lib/.exp).
          find out -type f ! -name '*.so' ! -name '*.dll' ! -name '*.dylib' -delete
          ls -la out
      # SC-009: los test-hooks NUNCA viajan en release. Dos correcciones de CHARTER-12:
      #  (a) el patrón era `weft_test_panic`, que NO casa con `weft_loro_test_panic` (no es
      #      substring) → el shim de Loro quedaba fuera del gate. Ahora se buscan ambos.
      #  (b) el gate pasaba en verde si la herramienta faltaba: `nm ... 2>/dev/null | grep -q` no
      #      distingue «no está el símbolo» de «no está nm». Un gate que no sabe fallar es la
      #      verificación fantasma que este Charter cierra, y estaba dentro del propio gate.
      #      Ahora: la herramienta debe existir, y debe demostrar que ve un símbolo de control que
      #      SÍ está en el binario (weft_abi_version) antes de creerle una ausencia.
      - name: Verify test hooks NOT exported (SC-009)
        working-directory: native
        shell: bash
        run: |
          set -euo pipefail

          symbols() {   # $1 = archivo → lista de símbolos, o falla si no hay herramienta
            case "$1" in
              *.so|*.dylib) nm -D "$1" 2>/dev/null || nm "$1" ;;
              *.dll)        strings "$1" ;;
            esac
          }

          case "$RUNNER_OS" in
            Windows) command -v strings >/dev/null || { echo "::error::falta 'strings': el gate SC-009 no puede verificar nada"; exit 1; } ;;
            *)       command -v nm      >/dev/null || { echo "::error::falta 'nm': el gate SC-009 no puede verificar nada"; exit 1; } ;;
          esac

          fail=0
          for f in out/*; do
            [ -f "$f" ] || continue
            syms="$(symbols "$f")"

            # Control positivo: si no vemos un símbolo que SÍ está, la ausencia de otro no prueba
            # nada. Se busca `abi_version` (substring de weft_abi_version Y weft_loro_abi_version):
            # buscar `weft_abi_version` fallaría en el cdylib de Loro por el mismo motivo de
            # substring que dejaba fuera a `weft_loro_test_panic`.
            if ! printf '%s' "$syms" | grep -q abi_version; then
              echo "::error::$f — la herramienta no encuentra ni *abi_version: el gate está ciego, no limpio"
              fail=1; continue
            fi

            found=0
            for hook in weft_test_panic weft_loro_test_panic; do
              if printf '%s' "$syms" | grep -q "$hook"; then
                echo "✗ $f expone $hook (test-hooks filtrado en release)"; found=1; fail=1
              fi
            done
            [ "$found" -eq 0 ] && echo "✓ $f sin test hooks (control positivo: weft_abi_version visible)"
          done
          exit $fail
      - name: Upload native artifacts
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.rid }}
          path: native/out/
          if-no-files-found: error

  # ── Empaquetar los 6 .nupkg con los 4 RIDs staged ───────────────────────────────────────────
  pack:
    name: pack
    needs: native
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Download native artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: native-*
          path: native-artifacts
      - name: Stage natives into native/target/<triple>/release/
        shell: bash
        run: |
          set -euo pipefail
          declare -A T=(
            [linux-x64]=x86_64-unknown-linux-gnu
            [linux-arm64]=aarch64-unknown-linux-gnu
            [win-x64]=x86_64-pc-windows-msvc
            [osx-arm64]=aarch64-apple-darwin
          )
          for rid in "${!T[@]}"; do
            dest="native/target/${T[$rid]}/release"
            mkdir -p "$dest"
            cp native-artifacts/native-$rid/* "$dest/"
          done
          find native/target -name '*weft_*ffi*' -type f
      - name: Pack (símbolos + SourceLink)
        run: dotnet pack Weft.sln -c Release -p:Version=${{ inputs.version }} -o artifacts/nupkg
      - name: Upload nupkgs
        uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: artifacts/nupkg/*
          if-no-files-found: error

  # ── pack-smoke: instalar el paquete y correr hello-Weft por RID (SC-007, P-VI) ───────────────
  pack-smoke:
    name: pack-smoke (${{ matrix.rid }})
    needs: pack
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { rid: linux-x64, runner: ubuntu-latest }
          - { rid: win-x64, runner: windows-latest }
          - { rid: osx-arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Download nupkgs
        uses: actions/download-artifact@v5
        with:
          name: nupkg
          path: artifacts/nupkg
      - name: hello-Weft desde el paquete
        working-directory: tests/pack-smoke
        run: dotnet run -c Release -p:WeftPackageVersion=${{ inputs.version }}

  # ── pack-smoke linux-arm64 vía QEMU (P-VI: RID sin runner nativo en GH) ──────────────────────
  pack-smoke-arm:
    name: pack-smoke (linux-arm64, QEMU)
    needs: pack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Download nupkgs
        uses: actions/download-artifact@v5
        with:
          name: nupkg
          path: artifacts/nupkg
      - uses: docker/setup-qemu-action@v4
      - name: hello-Weft en arm64
        run: |
          docker run --rm --platform linux/arm64 -v "$PWD":/w -w /w/tests/pack-smoke \
            mcr.microsoft.com/dotnet/sdk:10.0 \
            dotnet run -c Release -p:WeftPackageVersion=${{ inputs.version }}

  # ── Determinismo cross-implementación vs Yjs JS (research R13 (b)) — NO-BLOQUEANTE ───────────
  determinism-yjs:
    name: determinism-yjs (no-bloqueante)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      # Emite el hash de Yjs de ambos corpus (ascii + unicode) y self-checkea contra golden.json:
      # caza drift de Yjs (bump con impacto de encoding). La aserción BLOQUEANTE de paridad yrs↔Yjs
      # vive en Weft.Determinism.Tests (job `test`, per-PR); este job es informativo (FU-012/CHARTER-09).
      - name: Yjs export hash del corpus compartido (ascii + unicode, self-check golden)
        working-directory: tests/determinism-yjs
        run: |
          npm install
          npm test

  # ── PUBLISH (GATEADO): solo con dry_run=false. Paso irreversible del operador ─────────────────
  publish:
    name: publish (NuGet.org) [gated]
    needs: [pack-smoke, pack-smoke-arm]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      id-token: write # OIDC token for NuGet Trusted Publishing (no long-lived API key)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Download nupkgs
        uses: actions/download-artifact@v5
        with:
          name: nupkg
          path: artifacts/nupkg
      # Trusted Publishing: exchange the job's GitHub OIDC token for a short-lived (1 h, single-use)
      # NuGet API key. Requires a trusted-publisher policy on nuget.org for owner=StrangeDaysTech,
      # repo=StrangeDaysTech/weft, workflow=release.yml, environment=release. NUGET_USER is the
      # nuget.org profile/org username (not the email); it is not a secret but is kept out of the YAML.
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push a NuGet.org
        run: >-
          dotnet nuget push "artifacts/nupkg/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          gh release create "v${{ inputs.version }}" artifacts/nupkg/*.nupkg \
            --title "Weft v${{ inputs.version }}" --generate-notes
