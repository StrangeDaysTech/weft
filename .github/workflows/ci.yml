name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *" # nightly 06:00 UTC — job load-test (M1, SC-006)
  workflow_dispatch:

# Cancela ejecuciones antiguas de la misma rama/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  # ── Gate P-I: build del shim + binding, tests multiplataforma (T021) ──────────────────────
  test:
    name: test (${{ matrix.os }})
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      # El shim se compila CON test-hooks para la suite de panic-safety (SC-009); el binario de
      # release empaquetado (US4) se compila SIN la feature — el job `native` de release.yml
      # verifica con `nm` que los símbolos de test no están exportados en los cdylibs.
      - name: Build shim (test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Test .NET
        run: dotnet test --configuration Release
      - name: Rust tests
        working-directory: native
        run: cargo test --features test-hooks

  # ── Gate P-II: memoria verificada bajo ASan/LSan (NON-NEGOTIABLE) ─────────────────────────
  asan:
    name: asan (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      # AddressSanitizer + LeakSanitizer sobre AMBOS shims (T035): sin -p corre todo el workspace.
      - name: cargo test bajo AddressSanitizer + LeakSanitizer (yrs + loro)
        working-directory: native
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=1"
        run: >-
          cargo +nightly test --features test-hooks
          --target x86_64-unknown-linux-gnu

  # ── Fuzzing de la frontera FFI (research R14): smoke de 60 s por target en cada PR ─────────
  # El job BLOQUEA A MEDIAS, y es deliberado: un fallo de COMPILACIÓN de los targets (o de instalar
  # cargo-fuzz) pone el job rojo; un CRASH ENCONTRADO solo emite `::warning` (los `|| echo` de los
  # steps `fuzz run`). NO hay `continue-on-error` en el job. La razón del trato informativo del
  # crash es R6: el decoder de yrs amplifica memoria sobre un update malformado de pocos bytes
  # (`with_capacity(N)` sin cota → `handle_alloc_error`, que catch_unwind no puede contener). El shim
  # es correcto (contiene panics, sin UB); el fallo está aguas abajo, en yrs. La mitigación llegó en
  # CHARTER-08 (PR upstream y-crdt#639 + caveat en GOVERNANCE.md §Seguridad); lo que resta es
  # adoptar el fix vía bump (FU-015). Ver AILOG-2026-07-10-001 §R6.
  fuzz:
    name: fuzz (smoke; crash informativo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native
            native/weft-yrs-ffi/fuzz
            native/weft-loro-ffi/fuzz
      - name: Instalar cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Compilar aparte: un fallo de compilación de los targets SÍ debe romper el job (rojo).
      - name: Build fuzz targets (yrs)
        working-directory: native/weft-yrs-ffi
        run: cargo +nightly fuzz build -s none
      - name: Build fuzz targets (loro)
        working-directory: native/weft-loro-ffi
        run: cargo +nightly fuzz build -s none
      # El objetivo del smoke es que ningún input adversarial cause panic-through / UB / crash en
      # NUESTRO shim (research R14). Dos características del decoder de yrs sobre input malformado
      # obligan a configurar el harness para que mida eso y no artefactos de yrs (ver AILOG §R6):
      #  1. `-s none` (sin ASan): en las rutas de yrs que aún usan `with_capacity(N)` según una
      #     longitud declarada sin cota (el residual es id_set/state_vector vía export_since;
      #     Update::decode ya usa try_reserve en 0.27.2), glibc reserva esa memoria VIRTUAL (nunca se
      #     llena → RSS real ~150 MB) y yrs falla el decode → WEFT_ERR_DECODE. El allocator de ASan,
      #     en cambio, aborta reservas gigantes. La memory-safety la cubre el job `asan`.
      #  2. Hook de panic silenciado en el harness (fuzz_targets/*.rs): yrs usa `assert!` en algunos
      #     updates malformados; el shim los contiene con `catch_unwind` → WEFT_ERR_PANIC (verificado
      #     en tests). libfuzzer-sys aborta en su panic hook antes de que catch_unwind actúe, así que
      #     el harness lo silencia para ejercitar el mismo camino que producción. Un SIGSEGV/UB real
      #     no pasa por el hook y sigue detectándose.
      # La resistencia a amplificación con input de red no confiable ya está en la capa de servidor
      # (FU-002 cerrado: cap de tamaño de mensaje + límites de recursos por conexión, ver
      # WeftServerOptions). Para la RUTA DIRECTA del FFI, el caveat está en GOVERNANCE.md §Seguridad.
      # Crash informativo (R6): un crash del fuzz sobre la amplificación del decoder de yrs no rompe
      # el job. El `|| echo` captura ese crash y emite una ANOTACIÓN de warning visible en el PR; el
      # step sale con éxito (check verde). Un fallo de infraestructura (compilar los targets,
      # instalar cargo-fuzz) rompe el job en los steps anteriores, que NO llevan `|| echo`.
      - name: Fuzz weft_doc_load (60 s)
        working-directory: native/weft-yrs-ffi
        run: >-
          cargo +nightly fuzz run -s none doc_load --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (R6)::doc_load halló un crash por amplificación de memoria del decoder de yrs — no rompe el job; fix upstream y-crdt#639, adopción vía FU-015"
      - name: Fuzz weft_doc_apply_update (60 s)
        working-directory: native/weft-yrs-ffi
        run: >-
          cargo +nightly fuzz run -s none apply_update --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo::apply_update halló un crash — no rompe el job. Nota: Update::decode ya usa try_reserve en yrs 0.27.2, así que un crash aquí probablemente NO sea amplificación R6; revisar el artefacto"
      # Regresión R6 (CHARTER-08): ruta RESIDUAL state_vector::decode vía weft_doc_export_since — el
      # único sitio de yrs que aún usa with_capacity sin acotar (id_set/state_vector; Update::decode ya
      # usa try_reserve). Informativo hasta adoptar el fix upstream (FU-015); prueba el fix al bumpear.
      - name: Fuzz weft_doc_export_since (60 s)
        working-directory: native/weft-yrs-ffi
        run: >-
          cargo +nightly fuzz run -s none export_since --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (R6)::export_since halló un crash por amplificación de memoria del decoder de yrs (state_vector::decode residual) — no bloquea; fix upstream vía try_reserve (FU-015)"
      # Shim Loro (localmente no amplifica memoria; mismo patrón informativo por robustez).
      - name: Fuzz loro_doc_load (60 s)
        working-directory: native/weft-loro-ffi
        run: >-
          cargo +nightly fuzz run -s none loro_doc_load --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (loro)::loro_doc_load halló un crash — no rompe el job (ver AILOG)"
      - name: Fuzz loro_apply_update (60 s)
        working-directory: native/weft-loro-ffi
        run: >-
          cargo +nightly fuzz run -s none loro_apply_update --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (loro)::loro_apply_update halló un crash — no rompe el job (ver AILOG)"

  # ── Gate P-III: determinismo del encoding (bloqueante desde US1) ──────────────────────────
  determinism:
    name: determinism
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shim (test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Determinism gate
        run: dotnet test tests/Weft.Determinism.Tests/ --configuration Release
      # La paridad cross-implementación yrs↔Yjs es BLOQUEANTE y vive AQUÍ, en Weft.Determinism.Tests
      # (`Yrs_export_matches_yjs_golden` contra tests/determinism-yjs/golden.json) — se promovió en
      # CHARTER-09/FU-012. El job Node `determinism-yjs` de release.yml es solo informativo (regenera
      # el hash de Yjs para cazar drift del upstream), no la aserción de paridad.

  # ── Gate P-IV: suite de versionado sobre yrs Y Loro (bloqueante desde US5, SC-008) ────────
  dual-engine:
    name: dual-engine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shims (yrs + loro, test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Dual-engine versioning suite
        run: dotnet test tests/Weft.Versioning.Tests/ --configuration Release

  # ── FU-011: adaptador Redis ejercitado en CI contra un service container ───────────────────
  # El resto de la contract suite de IDocumentStore (InMemory/FileSystem/EFCore-SQLite) corre en el
  # job `test`; el adaptador Redis se salta ahí (sin servidor). Aquí lo ejercitamos de verdad — es
  # .NET managed puro (sin binario nativo), y Linux-only porque los service containers de GH Actions
  # solo corren en runners Linux (por eso no está en la matriz test win/mac).
  server-adapters:
    name: server-adapters (redis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Contract suite del adaptador Redis (contra el service container)
        env:
          WEFT_TEST_REDIS: localhost:6379
        run: dotnet test tests/Weft.Server.Tests/ -c Release --filter "FullyQualifiedName~RedisDocumentStoreContractTests"

  pack-smoke:
    name: pack-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # El pack-smoke multi-RID real (SC-007/P-VI) + la verificación de ausencia de los símbolos de
      # test (SC-009) viven en `release.yml` (CHARTER-07/T057): la matriz cross-compile es cara, así
      # que corre por `workflow_dispatch` (dry-run), NO en cada PR. Este job por-PR queda como
      # marcador — y así se documenta con honestidad, en vez de fingir que valida el empaquetado.
      - run: echo "pack-smoke multi-RID vive en release.yml (workflow_dispatch, dry_run) — CHARTER-07 T057."

  # ── Guard contra «verificaciones fantasma» de la clase filtro-de-test (FU-020, CHARTER-12) ────
  # BLOQUEANTE. Un `dotnet test --filter X` que no casa con ningún test pasa en verde ejecutando
  # cero — su síntoma es idéntico al del éxito. Este guard exige que cada filtro documentado/en CI
  # case con ≥1 test. Solo necesita .NET (usa --list-tests, no ejecuta la suite); ~1 min.
  test-filters:
    name: test-filters (guard fantasma)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Cada --filter documentado casa con ≥1 test
        run: bash .github/scripts/check-test-filters.sh

  # ── Gate M1 (P-V, SC-006): prueba de carga de concurrencia ────────────────────────────────
  # Nightly (schedule) + manual (workflow_dispatch): NO corre en PR (no lo bloquea), pero es
  # BLOQUEANTE para el cierre de M1 — el nightly debe estar verde. El harness sale con código ≠ 0
  # si algún documento queda inconsistente, la memoria no se acota (pico de documentos activos por
  # encima del pool) o alguna operación falla. Ver AILOG (US2) y CHARTER-03 §Verification.
  load-test:
    name: load-test (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shim (release)
        working-directory: native
        run: cargo build --release
      # docs (2000) >> max-active (pool) fuerza desalojo/reapertura intensos → ejercita la carrera
      # persistencia-vs-recarga sin pérdida de updates (SC-006), no solo el camino feliz.
      - name: Load test (miles de docs, tareas concurrentes sostenidas)
        run: >-
          dotnet run --configuration Release --project tests/Weft.LoadTest --
          --docs 2000 --tasks 16 --seconds 60
