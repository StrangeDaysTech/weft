name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *" # nightly 06:00 UTC — job load-test (M1, SC-006)
  workflow_dispatch:

# Cancela ejecuciones antiguas de la misma rama/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  # ── Gate P-I: build del shim + binding, tests multiplataforma (T021) ──────────────────────
  test:
    name: test (${{ matrix.os }})
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      # El shim se compila CON test-hooks para la suite de panic-safety (SC-009); el binario de
      # release empaquetado (US4) se compila SIN la feature — pack-smoke verifica la ausencia.
      - name: Build shim (test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Test .NET
        run: dotnet test --configuration Release
      - name: Rust tests
        working-directory: native
        run: cargo test --features test-hooks

  # ── Gate P-II: memoria verificada bajo ASan/LSan (NON-NEGOTIABLE) ─────────────────────────
  asan:
    name: asan (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      # Matriz de sanitizers sobre AMBOS shims (T035): sin -p corre todo el workspace nativo.
      - name: cargo test bajo AddressSanitizer + LeakSanitizer (yrs + loro)
        working-directory: native
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=1"
        run: >-
          cargo +nightly test --features test-hooks
          --target x86_64-unknown-linux-gnu

  # ── Fuzzing de la frontera FFI (research R14): smoke de 60 s por target en cada PR ─────────
  # INFORMATIVO en M0 (continue-on-error): el fuzz destapó un DoS por amplificación de memoria en el
  # decoder de yrs (upstream) — un update malformado de pocos bytes declara una longitud gigante y
  # yrs hace `with_capacity(N)` sin cota; en un entorno con memoria limitada la asignación falla y
  # Rust aborta (`handle_alloc_error`, NO capturable por catch_unwind). El shim FFI es correcto
  # (contiene panics, sin UB). La mitigación real (validar el update / límite de recursos) llega en
  # M2, donde entra input de red no confiable — ver AILOG-2026-07-10-001 §R6 y el follow-up. El job
  # sigue corriendo y reportando en los logs, sin bloquear el cierre de M0.
  fuzz:
    name: fuzz (smoke, informativo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native
            native/weft-yrs-ffi/fuzz
            native/weft-loro-ffi/fuzz
      - name: Instalar cargo-fuzz
        run: cargo install cargo-fuzz --locked
      # Compilar aparte: un fallo de compilación de los targets SÍ debe romper el job (rojo).
      - name: Build fuzz targets (yrs)
        working-directory: native/weft-yrs-ffi
        run: cargo +nightly fuzz build -s none
      - name: Build fuzz targets (loro)
        working-directory: native/weft-loro-ffi
        run: cargo +nightly fuzz build -s none
      # El objetivo del smoke es que ningún input adversarial cause panic-through / UB / crash en
      # NUESTRO shim (research R14). Dos características del decoder de yrs sobre input malformado
      # obligan a configurar el harness para que mida eso y no artefactos de yrs (ver AILOG §R6):
      #  1. `-s none` (sin ASan): yrs hace `with_capacity(N)` según una longitud declarada sin cota;
      #     glibc reserva esa memoria VIRTUAL (nunca se llena → RSS real ~150 MB) y yrs falla el
      #     decode → WEFT_ERR_DECODE. El allocator de ASan, en cambio, aborta reservas gigantes.
      #     La memory-safety la cubre el job `asan` sobre la suite determinista.
      #  2. Hook de panic silenciado en el harness (fuzz_targets/*.rs): yrs usa `assert!` en algunos
      #     updates malformados; el shim los contiene con `catch_unwind` → WEFT_ERR_PANIC (verificado
      #     en tests). libfuzzer-sys aborta en su panic hook antes de que catch_unwind actúe, así que
      #     el harness lo silencia para ejercitar el mismo camino que producción. Un SIGSEGV/UB real
      #     no pasa por el hook y sigue detectándose.
      # La resistencia a amplificación con input no confiable se endurece en la capa de servidor
      # (M2, límites de tamaño de mensaje + recursos del proceso).
      # Informativo (R6): un crash del fuzz sobre la amplificación de memoria del decoder de yrs no
      # bloquea M0. El comando captura ese crash y emite una ANOTACIÓN de warning visible en el PR;
      # el step sale con éxito (check verde, no rojo). Un fallo de infraestructura (compilación de
      # los targets, instalación) rompe el job en los steps anteriores. La mitigación real va en M2.
      - name: Fuzz weft_doc_load (60 s)
        working-directory: native/weft-yrs-ffi
        run: >-
          cargo +nightly fuzz run -s none doc_load --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (R6)::doc_load halló un crash por amplificación de memoria del decoder de yrs — no bloquea M0; mitigación en M2 (ver AILOG R6)"
      - name: Fuzz weft_doc_apply_update (60 s)
        working-directory: native/weft-yrs-ffi
        run: >-
          cargo +nightly fuzz run -s none apply_update --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (R6)::apply_update halló un crash por amplificación de memoria del decoder de yrs — no bloquea M0; mitigación en M2 (ver AILOG R6)"
      # Shim Loro (localmente no amplifica memoria; mismo patrón informativo por robustez).
      - name: Fuzz loro_doc_load (60 s)
        working-directory: native/weft-loro-ffi
        run: >-
          cargo +nightly fuzz run -s none loro_doc_load --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (loro)::loro_doc_load halló un crash — no bloquea M0 (ver AILOG)"
      - name: Fuzz loro_apply_update (60 s)
        working-directory: native/weft-loro-ffi
        run: >-
          cargo +nightly fuzz run -s none loro_apply_update --
          -max_total_time=60 -rss_limit_mb=0 -max_len=8192
          || echo "::warning title=fuzz informativo (loro)::loro_apply_update halló un crash — no bloquea M0 (ver AILOG)"

  # ── Gates que se activan en fases posteriores (jobs nombrados, T004) ──────────────────────
  # ── Gate P-III: determinismo del encoding (bloqueante desde US1) ──────────────────────────
  determinism:
    name: determinism
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shim (test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Determinism gate
        run: dotnet test tests/Weft.Determinism.Tests/ --configuration Release
      # El cross-implementación vs Yjs JS (mismo hash en todos los RIDs) se añade en US4 (T058).

  # ── Gate P-IV: suite de versionado sobre yrs Y Loro (bloqueante desde US5, SC-008) ────────
  dual-engine:
    name: dual-engine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shims (yrs + loro, test-hooks)
        working-directory: native
        run: cargo build --release --features test-hooks
      - name: Dual-engine versioning suite
        run: dotnet test tests/Weft.Versioning.Tests/ --configuration Release

  # ── FU-011: adaptador Redis ejercitado en CI contra un service container ───────────────────
  # El resto de la contract suite de IDocumentStore (InMemory/FileSystem/EFCore-SQLite) corre en el
  # job `test`; el adaptador Redis se salta ahí (sin servidor). Aquí lo ejercitamos de verdad — es
  # .NET managed puro (sin binario nativo), y Linux-only porque los service containers de GH Actions
  # solo corren en runners Linux (por eso no está en la matriz test win/mac).
  server-adapters:
    name: server-adapters (redis)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Contract suite del adaptador Redis (contra el service container)
        env:
          WEFT_TEST_REDIS: localhost:6379
        run: dotnet test tests/Weft.Server.Tests/ -c Release --filter "FullyQualifiedName~RedisDocumentStoreContractTests"

  pack-smoke:
    name: pack-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # El pack-smoke multi-RID real (SC-007/P-VI) + la verificación de ausencia de weft_test_panic
      # (SC-009) viven en `release.yml` (CHARTER-07/T057): la matriz cross-compile es cara, así que
      # corre por `workflow_dispatch` (dry-run), NO en cada PR. Este job por-PR queda como marcador.
      - run: echo "pack-smoke multi-RID vive en release.yml (workflow_dispatch, dry_run) — CHARTER-07 T057."

  # ── Gate M1 (P-V, SC-006): prueba de carga de concurrencia ────────────────────────────────
  # Nightly (schedule) + manual (workflow_dispatch): NO corre en PR (no lo bloquea), pero es
  # BLOQUEANTE para el cierre de M1 — el nightly debe estar verde. El harness sale con código ≠ 0
  # si algún documento queda inconsistente, la memoria no se acota (pico de documentos activos por
  # encima del pool) o alguna operación falla. Ver AILOG (US2) y CHARTER-03 §Verification.
  load-test:
    name: load-test (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build shim (release)
        working-directory: native
        run: cargo build --release
      # docs (2000) >> max-active (pool) fuerza desalojo/reapertura intensos → ejercita la carrera
      # persistencia-vs-recarga sin pérdida de updates (SC-006), no solo el camino feliz.
      - name: Load test (miles de docs, tareas concurrentes sostenidas)
        run: >-
          dotnet run --configuration Release --project tests/Weft.LoadTest --
          --docs 2000 --tasks 16 --seconds 60
