# Config for `cargo-about` — generates THIRD-PARTY-NOTICES.md for the Rust crates
# statically linked into the redistributed cdylibs (weft-yrs-ffi, weft-loro-ffi).
#
# Regenerate:  cargo about generate --manifest-path native/Cargo.toml native/about.hbs -o THIRD-PARTY-NOTICES.md
#
# `accepted` lists the SPDX license IDs we allow in redistributed binaries. All are
# permissive or weak-copyleft (MPL-2.0, file-level, compatible with proprietary use).
# A dependency licensed under a disallowed license would make `cargo about generate` fail
# — that is the CI gate.

# Our own (unpublished) workspace crates are not third parties — exclude them.
private = { ignore = true }

# Evaluate every RID we ship, so target-specific deps (Windows/macOS/UEFI) are covered.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-apple-darwin",
]

# Don't fail on crates that ship no license text of their own; cargo-about will fetch it.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "BSL-1.0",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
]
